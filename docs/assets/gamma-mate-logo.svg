<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="800" height="120">
  <defs>
    <linearGradient id="liquidnetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C13584;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8588C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8588C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Ship's Wheel -->
  <g transform="translate(30, 30)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#wheelGrad)" stroke-width="2.5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="url(#wheelGrad)" stroke-width="2"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="url(#wheelGrad)"/>

    <!-- 8 Spokes -->
    <line x1="0" y1="-8" x2="0" y2="-20" stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="0" y2="20" stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="-20" y2="0" stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="20" y2="0" stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5.66" y1="-5.66" x2="-14.14" y2="-14.14" stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.66" y1="5.66" x2="14.14" y2="14.14" stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5.66" y1="5.66" x2="-14.14" y2="14.14" stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.66" y1="-5.66" x2="14.14" y2="-14.14" stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round"/>

    <!-- 8 Handle pegs (outer knobs) -->
    <circle cx="0" cy="-22" r="2.5" fill="url(#wheelGrad)"/>
    <circle cx="0" cy="22" r="2.5" fill="url(#wheelGrad)"/>
    <circle cx="-22" cy="0" r="2.5" fill="url(#wheelGrad)"/>
    <circle cx="22" cy="0" r="2.5" fill="url(#wheelGrad)"/>
    <circle cx="-15.56" cy="-15.56" r="2.5" fill="url(#wheelGrad)"/>
    <circle cx="15.56" cy="15.56" r="2.5" fill="url(#wheelGrad)"/>
    <circle cx="-15.56" cy="15.56" r="2.5" fill="url(#wheelGrad)"/>
    <circle cx="15.56" cy="-15.56" r="2.5" fill="url(#wheelGrad)"/>
  </g>

  <!-- GAMMA MATE text -->
  <text x="62" y="25" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="0.12em" fill="url(#liquidnetGrad)">GAMMA</text>
  <text x="62" y="48" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="0.12em" fill="url(#liquidnetGrad)">MATE</text>
</svg>
